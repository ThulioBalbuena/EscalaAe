name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancela runs anteriores da mesma branch/PR para economizar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JOB 1 – teste
  test:
    name: 🧪 Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Criar diretório de relatório
        run: mkdir -p test-results

      - name: Executar testes
        run: npm test -- --reporter=verbose --reporter=json --outputFile=test-results/results.json

      - name: Salvar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test-results/
          retention-days: 30

  # JOB 2 – build
  # Só roda se o job "test" passou. Gera o pacote de produção via Vite.
  build:
    name: 🏗️ Build de Produção
    runs-on: ubuntu-latest
    needs: test          

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        run: npm run build

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # JOB 3 – notificacao 
  notify:
    name: 📧 Notificação por E-mail
    runs-on: ubuntu-latest
    needs: test          
    if: always()      

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Enviar notificação
        run: node scripts/notify.mjs
        env:
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CI_STATUS: ${{ job.status }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_BRANCH: ${{ github.ref_name }}
          CI_COMMIT: ${{ github.sha }}
          CI_PROJECT: ${{ github.repository }}

  # JOB 4 – deploy no pages
  deploy:
    name: 🚀 Deploy – GitHub Pages
    runs-on: ubuntu-latest
    needs: build         

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
